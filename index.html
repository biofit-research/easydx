<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>알기쉬운 진단명 가이드</title>
  <meta name="description" content="진단서 속 그 코드, 누구나 이해할 수 있게. 외래 다빈도 100가지 진단명을 의료진이 검수한 쉬운 한국어로 풀어드립니다." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: #F5F1E8;
      color: #1A1A1A;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    button { font-family: inherit; }
    input { font-family: inherit; }
    .container-narrow { max-width: 56rem; margin: 0 auto; padding: 0 1.5rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    @media (max-width: 640px) {
      .grid-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="root">
    <div style="font-family: 'Noto Sans KR', sans-serif; padding: 60px 24px; max-width: 720px; margin: 0 auto; text-align: center; color: #6B6356;">
      <div style="font-family: 'Noto Serif KR', serif; font-size: 28px; color: #1F6E5C; font-weight: 700; margin-bottom: 16px;">불러오는 중…</div>
      <div style="font-size: 14px; line-height: 1.7;">
        한글 폰트와 React를 불러오고 있습니다. 잠시만 기다려 주세요.<br/>
        10초 이상 이 화면이 보이면 페이지를 새로고침(F5)해 보세요.
      </div>
      <div id="error-display" style="display:none; margin-top: 24px; padding: 16px; background: #FFF5EE; border: 1px solid #B8501F; color: #B8501F; text-align: left; font-size: 13px; border-radius: 4px;"></div>
    </div>
  </div>
