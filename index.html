<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>알기쉬운 진단명 가이드</title>
  <meta name="description" content="진단서 속 그 코드, 누구나 이해할 수 있게." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: #F5F1E8;
      color: #1A1A1A;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    button { font-family: inherit; }
    input { font-family: inherit; }
    .container-narrow, .max-w-4xl { max-width: 56rem; margin-left: auto; margin-right: auto; }
    .max-w-4xl { padding-left: 1.5rem; padding-right: 1.5rem; }
    .mx-auto { margin-left: auto; margin-right: auto; }
    .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
    .pt-12 { padding-top: 3rem; }
    .pb-8 { padding-bottom: 2rem; }
    .pb-12 { padding-bottom: 3rem; }
    .pb-16 { padding-bottom: 4rem; }
    .mb-8 { margin-bottom: 2rem; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .gap-2 { gap: 0.5rem; }
    .mb-4 { margin-bottom: 1rem; }

    /* ============ MOBILE / TABLET OPTIMIZATIONS ============ */
    /* TABLET — width up to 900px */
    @media (max-width: 900px) {
      .max-w-4xl, .container-narrow {
        padding-left: 1.25rem !important;
        padding-right: 1.25rem !important;
      }
    }

    /* MOBILE — width up to 640px (typical phone portrait) */
    @media (max-width: 640px) {
      body { -webkit-text-size-adjust: 100%; }

      /* Container & header */
      .max-w-4xl, .container-narrow {
        padding-left: 16px !important;
        padding-right: 16px !important;
      }
      .pt-12 { padding-top: 1.5rem !important; }
      .pb-8  { padding-bottom: 1rem !important; }
      .pb-12 { padding-bottom: 1.5rem !important; }
      .pb-16 { padding-bottom: 2rem !important; }

      /* Title and large headings */
      h1 { font-size: 30px !important; line-height: 1.2 !important; letter-spacing: -0.01em !important; }
      h2 { font-size: 20px !important; }

      /* Stats grid — 3 columns to 1 column */
      [style*="repeat(3, 1fr)"] {
        grid-template-columns: 1fr !important;
        gap: 12px !important;
      }

      /* Detail-card horizontal padding (36px → 16px) */
      [style*="padding: 32px 36px 28px"] { padding: 22px 16px 18px !important; }
      [style*="padding: 28px 36px"]     { padding: 22px 16px !important; }
      [style*="padding: 32px 36px"]     { padding: 22px 16px !important; }
      [style*="padding: 20px 36px"]     { padding: 16px 16px !important; }
      [style*="padding: 24px 36px"]     { padding: 18px 16px !important; }
      [style*="padding: 16px 36px"]     { padding: 14px 16px !important; }

      /* Disclaimer box */
      [style*="padding: 16px 20px"] { padding: 14px 16px !important; }

      /* Big number 52px in detail-card header (rank·code) */
      [style*="font-size: 52px"] { font-size: 38px !important; }

      /* Stat-card number 36px */
      [style*="font-size: 36px"] { font-size: 28px !important; }

      /* Section heading 17-20px */
      [style*="font-size: 20px"] { font-size: 17px !important; }

      /* SVG illustration max-width */
      [style*="max-width: 440px"] { max-width: 100% !important; }

      /* Tap targets — make buttons easier to press */
      button { min-height: 40px; }

      /* Category chip bar — allow horizontal scroll if needed */
      [style*="flex-wrap: wrap"][style*="gap"] {
        scrollbar-width: thin;
      }

      /* Search dropdown — full width on mobile */
      [style*="max-width: 720px"], [style*="max-width: 620px"], [style*="max-width: 560px"] {
        max-width: 100% !important;
      }

      /* Footer padding */
      footer { padding: 20px 16px !important; }
    }

    /* SMALL MOBILE — width up to 400px (older / small phones) */
    @media (max-width: 400px) {
      h1 { font-size: 26px !important; }
      [style*="font-size: 52px"] { font-size: 32px !important; }
      [style*="font-size: 48px"] { font-size: 28px !important; }
      [style*="font-size: 36px"] { font-size: 24px !important; }
    }
  </style>
</head>
<body>
  <div id="root">
    <div style="font-family: 'Noto Sans KR', sans-serif; padding: 60px 24px; max-width: 720px; margin: 0 auto; text-align: center; color: #6B6356;">
      <div style="font-family: 'Noto Serif KR', serif; font-size: 28px; color: #1F6E5C; font-weight: 700; margin-bottom: 16px;">불러오는 중…</div>
      <div style="font-size: 14px; line-height: 1.7;">잠시만 기다려 주세요.</div>
      <div id="error-display" style="display:none; margin-top: 24px; padding: 16px; background: #FFF5EE; border: 1px solid #B8501F; color: #B8501F; text-align: left; font-size: 13px; border-radius: 4px;"></div>
    </div>
  </div>

  <script>
    window.addEventListener('error', function(e) {
      var box = document.getElementById('error-display');
      if (box) {
        box.style.display = 'block';
        box.innerHTML = '<strong>오류 발생:</strong><br/>' + (e.message || '알 수 없는 오류') + '<br/><br/>페이지를 새로고침(F5)해 주세요.';
      }
    });
  </script>

function matchDiseases(query) {
  const q = query.trim().toLowerCase();
  if (!q) return [];
  return DISEASES.filter(d => d.code.toLowerCase().includes(q) || d.name.includes(q) || d.english.toLowerCase().includes(q) || d.aliases.some(a => a.includes(q)));
}
function lookupByCode(code) {
  return DISEASES.find(d => d.code === code);
}
function isEmergency(q) {
  const lower = q.toLowerCase();
  return EMERGENCY_KEYWORDS.some(k => lower.includes(k));
}
